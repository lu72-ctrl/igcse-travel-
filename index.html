<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lǚyóu 旅游 Travel — 阅读与打字练习 · Lachlan 的汉语课</title>
<style>
:root{
  --ink:#274A3F; --ink2:#3D6A5A; --ink9:#14261F;
  --sun:#F2A900; --sun-s:#FDF3DC;
  --paper:#FBF5E6; --line:#E4E0D4; --grey:#6B7A75;
  --ok:#2E7D5B; --ok-bg:#E7F4EE; --no:#C0492F; --no-bg:#FBEAE6;
  --r:14px; --sh:0 2px 14px rgba(20,38,31,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:"LXGW WenKai TC","LXGW WenKai","KaiTi","楷体",Calibri,system-ui,sans-serif;
  background:#F4F1E8;color:var(--ink9);line-height:1.8;font-size:16px;
}
body.fs-l{font-size:19px} body.fs-xl{font-size:22px}

/* ===== 全局拼音开关：关掉时所有拼音一起消失 ===== */
body.no-py .py,
body.no-py .pyx,
body.no-py ruby rt,
body.no-py .py-only{display:none!important}
body.no-py .lb{gap:0}

/* 三语标签 */
.lb{display:inline-flex;flex-direction:column;line-height:1.25;text-align:inherit}
.lb .py{font-size:.62em;color:var(--sun);font-weight:700;letter-spacing:.02em}
.lb .cn{font-size:1em;font-weight:700}
.lb .en{font-size:.62em;color:var(--grey);font-weight:400}
header .lb .en{color:#9FB3AB}
nav .lb .en{color:inherit;opacity:.75}
.pyx{color:var(--sun);font-weight:700}

header{background:var(--ink);color:#fff;padding:18px 20px 0;position:sticky;top:0;z-index:60;box-shadow:0 2px 16px rgba(0,0,0,.18)}
.wrap{max-width:1000px;margin:0 auto}
.hrow{display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap}
.hrow h1{font-size:1.35rem;letter-spacing:.04em;line-height:1.3}
.hrow h1 small{display:block;font-size:.58rem;color:var(--sun);font-weight:700;letter-spacing:.14em}
.hrow h1 em{display:block;font-size:.58rem;color:#9FB3AB;font-style:normal}
.who{margin-left:auto;font-size:.78rem;color:#9FB3AB;text-align:right;line-height:1.5}
.who b{color:var(--sun);display:block;font-size:.9rem}
.tools{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.tools button{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.22);
  border-radius:999px;padding:5px 13px;font:inherit;font-size:.75rem;cursor:pointer;transition:.15s}
.tools button:hover{background:var(--sun);color:var(--ink9);border-color:transparent}
.tools button.on{background:var(--sun);color:var(--ink9);border-color:transparent;font-weight:700}
nav{display:flex;gap:2px;overflow-x:auto;margin-top:12px}
nav button{background:none;border:none;color:#B9CCC4;font:inherit;padding:9px 14px;cursor:pointer;
  white-space:nowrap;border-bottom:3px solid transparent;text-align:center}
nav button.on{color:#fff;border-bottom-color:var(--sun)}
nav button.on .py{color:var(--sun)}

main{max-width:1000px;margin:0 auto;padding:24px 20px 100px}
section{display:none} section.on{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
h2.sec{font-size:1.4rem;color:var(--ink);margin-bottom:4px}
.lead{color:var(--grey);font-size:.88rem;margin-bottom:20px;line-height:1.7}
h3{font-size:1.05rem;color:var(--ink);margin:26px 0 12px;display:flex;align-items:center;gap:9px}
h3::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--sun);flex:none}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh);margin-bottom:14px}
.tint{background:var(--paper)}
.note{background:var(--sun-s);border-left:4px solid var(--sun);border-radius:0 10px 10px 0;padding:12px 15px;margin:14px 0;font-size:.88rem}
.note .en{color:var(--grey);display:block;margin-top:3px;font-size:.85em}

/* 阅读 */
.story{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:26px 24px;box-shadow:var(--sh);position:relative;overflow:hidden}
.story::after{content:"Lachlan 的汉语课";position:absolute;right:-14px;bottom:40px;transform:rotate(-32deg);
  font-size:1.45rem;color:rgba(39,74,63,.05);font-weight:700;pointer-events:none;letter-spacing:.1em}
.story p{text-indent:2em;margin-bottom:16px;font-size:1.06rem;line-height:2.5;position:relative;z-index:1}
ruby{ruby-position:over}
ruby rt{font-size:.48em;color:var(--sun);font-weight:700;line-height:1.4}
.w{cursor:pointer;border-bottom:2px solid var(--sun);padding:0 1px;border-radius:2px;transition:.12s}
.w:hover,.w:focus-visible{background:var(--sun-s);outline:none}
.w.act{background:var(--sun);color:var(--ink9)}
.pop{position:fixed;z-index:80;background:var(--ink);color:#fff;border-radius:12px;padding:14px 16px;
  max-width:340px;box-shadow:0 10px 30px rgba(0,0,0,.3);font-size:.88rem;display:none;line-height:1.65}
.pop.on{display:block}
.pop .ph{font-size:1.5rem;font-weight:700;line-height:1.3}
.pop .pp{color:var(--sun);font-weight:700;font-size:.9rem}
.pop .pe{color:#DCE6E1;margin:5px 0 8px}
.pop .px{border-top:1px solid rgba(255,255,255,.18);padding-top:8px;margin-top:4px;color:#C9D6D0;font-size:.83rem}
.pop .pn{background:rgba(242,169,0,.16);border-radius:8px;padding:7px 10px;margin-top:8px;font-size:.8rem;color:#FFE6AE}
.pop .pn .pyx{color:#FFD070}
.pop button{background:var(--sun);color:var(--ink9);border:none;border-radius:999px;padding:5px 14px;
  font:inherit;font-size:.78rem;font-weight:700;cursor:pointer;margin-top:10px}
.pop .close{position:absolute;top:8px;right:11px;background:none;color:#9FB3AB;font-size:1.1rem;padding:0;margin:0;width:22px}

/* 词汇表 */
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.chip{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 14px;font:inherit;font-size:.8rem;cursor:pointer;line-height:1.3}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
#vq{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:10px;font:inherit;margin-bottom:14px;background:#fff}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.vc{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:15px;box-shadow:var(--sh);position:relative;transition:.15s}
.vc:hover{transform:translateY(-2px);border-color:var(--sun)}
.vc .n{position:absolute;top:12px;right:14px;font-size:.7rem;color:#B9C2BE}
.tg{display:inline-block;font-size:.64rem;padding:2px 8px;border-radius:999px;margin-bottom:6px}
.tg.c{background:var(--sun);color:var(--ink9);font-weight:700}
.tg.e{background:#EDEAE0;color:var(--grey)}
.vc .han{font-size:1.85rem;font-weight:700;color:var(--ink);line-height:1.35;cursor:pointer}
.vc .en2{font-size:.85rem;margin-top:4px}
.vc .pos{color:var(--grey);font-size:.72rem}
.vc .ex2{border-left:3px solid var(--sun);padding-left:9px;margin-top:9px;font-size:.84rem;color:#3b4a44}
.vc .nt{background:var(--sun-s);border-radius:8px;padding:7px 10px;margin-top:8px;font-size:.78rem;color:#7a5600}
.spk{background:none;border:1px solid var(--line);border-radius:8px;padding:3px 10px;font:inherit;font-size:.75rem;cursor:pointer;color:var(--ink);margin-top:8px}
.spk:hover{background:var(--ink);color:#fff;border-color:var(--ink)}

/* 打字 */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:10px;margin-bottom:16px}
.st{background:var(--ink);color:#fff;border-radius:12px;padding:12px 14px;text-align:center}
.st b{display:block;font-size:1.7rem;color:var(--sun);line-height:1.2;font-variant-numeric:tabular-nums}
.st span{font-size:.66rem;color:#A9C0B6;display:block;line-height:1.35}
.st span i{display:block;font-style:normal;color:#fff;font-size:.78rem;font-weight:700}
.tcard{background:#fff;border:2px solid var(--line);border-radius:var(--r);padding:24px;box-shadow:var(--sh);text-align:center}
.tcard.good{border-color:var(--ok);background:var(--ok-bg)}
.tcard.bad{border-color:var(--no);background:var(--no-bg)}
.prompt-en{font-size:1.25rem;font-weight:700;color:var(--ink);margin-bottom:4px}
.prompt-py{color:var(--sun);font-weight:700;font-size:1.35rem;letter-spacing:.03em;min-height:1.4em}
.prompt-hint{color:var(--grey);font-size:.82rem;margin-top:6px}
.reveal{font-size:2.6rem;font-weight:700;color:var(--ink);margin:12px 0 4px;min-height:1.2em;letter-spacing:.05em}
.reveal.hide{color:transparent;text-shadow:0 0 18px rgba(39,74,63,.42)}
.tin{width:100%;max-width:420px;padding:13px 16px;border:2px solid var(--ink);border-radius:12px;
  font:inherit;font-size:1.4rem;text-align:center;margin:14px auto 0;display:block;background:#fff}
.tin:focus{outline:3px solid var(--sun);outline-offset:2px}
.tfb{margin-top:12px;font-size:.9rem;min-height:1.6em;font-weight:700}
.tfb.ok{color:var(--ok)} .tfb.no{color:var(--no)}
.btn{background:var(--ink);color:#fff;border:none;border-radius:999px;padding:9px 20px;font:inherit;font-size:.85rem;cursor:pointer;margin:12px 5px 0}
.btn:hover{background:var(--ink2)}
.btn.y{background:var(--sun);color:var(--ink9);font-weight:700}
.btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
.modes{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.target{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:20px;
  font-size:1.45rem;line-height:2.1;letter-spacing:.04em;text-align:left;word-break:break-all;min-height:3em}
.target span.ok{color:var(--ok)}
.target span.no{color:var(--no);background:var(--no-bg);border-radius:3px}
.target span.cur{background:var(--sun);color:var(--ink9);border-radius:3px}
.target span.pc{color:#B9A87A}
.target span.pc.ok{color:var(--ok)}
.tarea{width:100%;padding:14px 16px;border:2px solid var(--ink);border-radius:12px;font:inherit;
  font-size:1.2rem;line-height:1.9;margin-top:14px;background:#fff;resize:vertical;min-height:88px}
.tarea:focus{outline:3px solid var(--sun);outline-offset:2px}
.punc{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;justify-content:center;align-items:center}
.punc button{background:#fff;border:1px solid var(--line);border-radius:8px;min-width:38px;height:34px;
  font:inherit;font-size:1rem;cursor:pointer;color:var(--ink);padding:0 10px}
.punc button:hover{background:var(--sun);border-color:var(--sun)}
.punc .sp{font-size:.78rem;font-weight:700}
.prog{height:7px;background:var(--line);border-radius:99px;overflow:hidden;margin:14px 0}
.prog i{display:block;height:100%;background:var(--sun);width:0;transition:width .3s}
.slist{display:flex;gap:5px;flex-wrap:wrap;margin-top:12px}
.sdot{width:27px;height:27px;border-radius:7px;border:1px solid var(--line);background:#fff;
  font:inherit;font-size:.7rem;cursor:pointer;color:var(--grey)}
.sdot.on{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:700}
.sdot.fin{background:var(--ok-bg);color:var(--ok);border-color:var(--ok)}

/* 题目 */
.q{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:10px;
  padding:10px 14px;margin-bottom:7px;font:inherit;font-size:.93rem;cursor:pointer;transition:.13s}
.opt:hover:not(:disabled){border-color:var(--sun);background:var(--sun-s)}
.opt:disabled{cursor:default}
.opt.right{border-color:var(--ok);background:var(--ok-bg);font-weight:700}
.opt.wrong{border-color:var(--no);background:var(--no-bg)}
.fb{display:none;margin-top:8px;padding:9px 12px;border-radius:10px;background:var(--sun-s);font-size:.85rem;border-left:4px solid var(--sun)}
.fb.show{display:block}

/* 反馈 */
.scale{display:flex;gap:7px;flex-wrap:wrap}
.scale button,.multi button{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:9px 14px;
  font:inherit;font-size:.85rem;cursor:pointer;flex:1;min-width:120px;text-align:center;transition:.13s}
.scale button:hover,.multi button:hover{border-color:var(--sun)}
.scale button.on,.multi button.on{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:700}
.multi{display:flex;gap:7px;flex-wrap:wrap}
.fbox{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font:inherit;
  font-size:.95rem;line-height:1.8;background:#fff;resize:vertical;min-height:80px}
.fbox:focus{outline:3px solid var(--sun);outline-offset:1px}
.saved{color:var(--ok);font-size:.78rem;float:right}
.sum{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.sumi{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
.sumi b{display:block;font-size:1.5rem;color:var(--ink);line-height:1.3}
.sumi span{font-size:.7rem;color:var(--grey);line-height:1.4;display:block}
#copyout{width:100%;min-height:150px;padding:12px;border:1px dashed var(--line);border-radius:10px;
  font-family:Menlo,Consolas,monospace;font-size:.8rem;background:var(--paper);margin-top:10px;display:none}
#copyout.on{display:block}

footer{background:var(--ink);color:#8FA69D;text-align:center;padding:20px;font-size:.75rem}
:focus-visible{outline:3px solid var(--sun);outline-offset:2px}
@media(max-width:600px){
  .story{padding:20px 16px}.story p{font-size:1rem;line-height:2.4}
  .target{font-size:1.2rem}.reveal{font-size:2.1rem}.who{margin-left:0;text-align:left}
}
@media print{header,nav,.tools,footer,.spk,.filters,#vq,.punc,.btn{display:none!important}
  section{display:block!important;page-break-after:always}body{background:#fff}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>

/* ---------- 工具 ---------- */
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function speak(t,rate){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.lang='zh-CN';u.rate=rate||0.85;
  speechSynthesis.speak(u);
}
const TONE={'ā':'a','á':'a','ǎ':'a','à':'a','ē':'e','é':'e','ě':'e','è':'e','ī':'i','í':'i','ǐ':'i','ì':'i',
 'ō':'o','ó':'o','ǒ':'o','ò':'o','ū':'u','ú':'u','ǔ':'u','ù':'u','ǖ':'v','ǘ':'v','ǚ':'v','ǜ':'v','ü':'v','ń':'n','ň':'n'};
function flat(s){return String(s).toLowerCase().split('').map(c=>TONE[c]||c).join('').replace(/[^a-z]/g,'');}
const TONED=/[āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜüńň]/;
// 把注释里的拼音包起来，好让全局拼音开关能一起控制
function wrapPy(s){
  return esc(s).replace(/[A-Za-zāáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜüńň’']+/g,
    m => TONED.test(m) ? '<span class="pyx">'+m+'</span>' : m);
}
function L(py,cn,en){return '<span class="lb"><span class="py">'+py+'</span><span class="cn">'+cn+'</span><span class="en">'+en+'</span></span>';}

const BYWORD={};V.forEach(v=>BYWORD[v.c]=v);
const KEYS=V.map(v=>v.c).sort((a,b)=>b.length-a.length);
function markup(text){
  let out='',i=0;
  while(i<text.length){
    let hit=null;
    for(const k of KEYS){ if(text.startsWith(k,i)){hit=k;break;} }
    if(hit){
      const v=BYWORD[hit];
      out+='<span class="w" tabindex="0" data-w="'+esc(hit)+'"><ruby>'+esc(hit)+'<rt>'+esc(v.p)+'</rt></ruby></span>';
      i+=hit.length;
    }else{ out+=esc(text[i]); i++; }
  }
  return out;
}

function showPop(word,el){
  const v=BYWORD[word];if(!v)return;
  const p=document.getElementById('pop');
  p.innerHTML='<button class="close" data-x="1">×</button>'+
    '<div class="pp py">'+esc(v.p)+'</div><div class="ph">'+esc(v.c)+'</div>'+
    '<div class="pe">'+esc(v.pos)+'　'+esc(v.en)+'</div>'+
    '<div class="px">'+esc(v.ex)+'</div>'+
    (v.note?'<div class="pn">📌 '+wrapPy(v.note)+'</div>':'')+
    '<button data-say="'+esc(v.c)+'">🔊 Tīng 听 Listen</button>';
  p.classList.add('on');
  const r=el.getBoundingClientRect(),pw=Math.min(340,window.innerWidth-24);
  let x=r.left+r.width/2-pw/2;
  x=Math.max(12,Math.min(x,window.innerWidth-pw-12));
  let y=r.bottom+10;
  if(y+250>window.innerHeight&&r.top>260)y=Math.max(10,r.top-p.offsetHeight-10);
  p.style.left=x+'px';p.style.top=y+'px';p.style.width=pw+'px';
  document.querySelectorAll('.w.act').forEach(w=>w.classList.remove('act'));
  el.classList.add('act');
  speak(v.c);
}
function hidePop(){
  const p=document.getElementById('pop');if(p)p.classList.remove('on');
  document.querySelectorAll('.w.act').forEach(w=>w.classList.remove('act'));
}

function t1Load(){
  t1Cancel();
  const pool=T1.scope==='core'?V.filter(v=>v.core):V;
  T1.list=pool.slice().sort(()=>Math.random()-0.5);
  T1.i=0;T1.ok=0;T1.tries=0;t1Show();
}
function t1Show(){
  const v=T1.list[T1.i];if(!v)return;
  const en=document.getElementById('t1en');if(!en)return;
  const hz=T1.mode==='hanzi';
  en.textContent=v.en;
  const py=document.getElementById('t1py');
  if(hz){
    // 汉字模式：拼音是提示
    py.className='prompt-py py';py.textContent=v.p;
    document.getElementById('t1pos').textContent=v.pos+(pyOn()?'':'　（拼音已关闭 Pinyin is off — 打开顶部拼音按钮可看提示）');
  }else{
    // 拼音模式：汉字是提示，拼音才是答案，不能显示
    py.className='prompt-py';py.textContent=v.c;
    document.getElementById('t1pos').textContent=v.pos+'　打出拼音（不用声调）Type the pinyin, no tone marks';
  }
  const rev=document.getElementById('t1rev');
  rev.textContent=hz?v.c:v.t;rev.classList.add('hide');
  const inp=document.getElementById('t1in');
  inp.value='';inp.disabled=false;inp.focus();
  document.getElementById('t1fb').textContent='';
  document.getElementById('t1card').className='tcard';
  document.getElementById('t1n').textContent=(T1.i+1)+'/'+T1.list.length;
  t1Stats();
}
function t1Stats(){
  if(!document.getElementById('t1ok'))return;
  document.getElementById('t1ok').textContent=T1.ok;
  document.getElementById('t1ac').textContent=T1.tries?Math.round(T1.ok/T1.tries*100)+'%':'—';
  document.getElementById('t1b').textContent=S.best.word?S.best.word+'%':'—';
}
function t1Check(){
  const v=T1.list[T1.i];if(!v)return;
  const inp=document.getElementById('t1in'),val=inp.value.trim();
  if(!val)return;
  const ok = T1.mode==='pinyin'
    ? (flat(val)===flat(v.p)||flat(val)===v.t)
    : (val===v.c);
  T1.tries++;
  const card=document.getElementById('t1card'),fb=document.getElementById('t1fb');
  if(ok){
    T1.ok++;card.className='tcard good';
    fb.className='tfb ok';fb.textContent='✅ Duì le! 对了！Correct — '+v.c+'  '+v.p;
    document.getElementById('t1rev').classList.remove('hide');
    speak(v.c);inp.disabled=true;
    const acc=Math.round(T1.ok/T1.tries*100);
    if(!S.best.word||acc>S.best.word){S.best.word=acc;save();}
    t1Cancel();
    t1Timer=setTimeout(()=>{t1Timer=null;if(T1.i<T1.list.length-1){T1.i++;t1Show();}else t1Done();},1000);
  }else{
    card.className='tcard bad';
    fb.className='tfb no';
    fb.textContent=T1.mode==='pinyin'?'❌ Zài shì yí cì. 再试一次。Try again.':'❌ Zài shì yí cì. 再试一次。Try again — 拼音 '+v.p;
    setTimeout(()=>{const c=document.getElementById('t1card');if(c)c.className='tcard'},700);
  }
  t1Stats();
}
function t1Done(){
  const card=document.getElementById('t1card');if(!card)return;
  const acc=T1.tries?Math.round(T1.ok/T1.tries*100):0;
  card.innerHTML='<div class="prompt-en">🎉 Wánchéng! 完成！Finished!</div>'+
    '<div class="reveal">'+acc+'%</div>'+
    '<div class="prompt-hint">Dá duì 答对 Correct: '+T1.ok+' / '+T1.tries+'</div>'+
    '<button class="btn y" id="t1new">'+L('Zài liàn yí cì','再练一次','Practise again')+'</button>';
}

/* ===== 4. 故事打字 ===== */
let T2={i:0,start:0,typed:'',strict:false};
const PUNCS=['，','。','、','？','！','：','“','”'];
// 每个中文标点可以用哪些键代替
const ALT={'，':[',',' '],'。':['.',' '],'、':[',',' '],'？':['?',' '],'！':['!',' '],
 '：':[':',' '],'；':[';',' '],'“':['"',' '],'”':['"',' '],'‘':["'",' '],'’':["'",' '],
 '（':['(',' '],'）':[')',' '],'…':['.',' '],'—':['-',' ']};
const isPunc=c=>Object.prototype.hasOwnProperty.call(ALT,c)||c===' ';
function charOk(tgt,typed){
  if(typed===tgt)return true;
  if(T2.strict)return false;
  const a=ALT[tgt];
  return a?a.indexOf(typed)>=0:false;
}

      '<button class="btn y" id="t2next">'+L('Xià yí jù','下一句','Next')+' →</button>'+

function t2Show(){
  document.getElementById('t2n').textContent=(T2.i+1)+'/'+SENTS.length;
  document.getElementById('t2in').value='';
  T2.typed='';T2.start=0;
  document.getElementById('t2fb').textContent='';
  document.getElementById('t2sp').textContent='—';
  document.getElementById('t2b').textContent=S.best.cpm||'—';
  t2Paint();
  document.getElementById('t2dots').innerHTML=SENTS.map((s,i)=>
    '<button class="sdot '+(i===T2.i?'on':(S.done[i]?'fin':''))+'" data-d="'+i+'">'+(i+1)+'</button>').join('');
  document.getElementById('t2in').focus();
}
function t2Paint(){
  const tar=SENTS[T2.i],typed=T2.typed;
  let good=0;
  const html=tar.split('').map((c,i)=>{
    const pc=isPunc(c)?' pc':'';
    if(i<typed.length){
      const ok=charOk(c,typed[i]); if(ok)good++;
      return '<span class="'+(ok?'ok':'no')+pc+'">'+esc(c==' '?'␣':c)+'</span>';
    }
    return '<span class="'+(i===typed.length?'cur':'')+pc+'">'+esc(c==' '?'␣':c)+'</span>';
  }).join('');
  document.getElementById('t2tar').innerHTML=html;
  document.getElementById('t2prog').style.width=Math.min(100,Math.round(typed.length/tar.length*100))+'%';
  document.getElementById('t2ac').textContent=typed.length?Math.round(good/typed.length*100)+'%':'—';
  if(T2.start&&typed.length){
    const mins=(Date.now()-T2.start)/60000;
    document.getElementById('t2sp').textContent=mins>0.02?Math.round(typed.length/mins):'—';
  }
  if(typed.length>=tar.length){
    const fb=document.getElementById('t2fb');
    if(good===tar.length){
      fb.className='tfb ok';fb.textContent='✅ Wánquán zhèngquè! 完全正确！Perfect — well done!';
      S.done[T2.i]=1;save();
      const mins=(Date.now()-T2.start)/60000,cpm=mins>0.02?Math.round(tar.length/mins):0;
      if(cpm&&(!S.best.cpm||cpm>S.best.cpm)){S.best.cpm=cpm;save();document.getElementById('t2b').textContent=cpm;}
      const dot=document.querySelectorAll('.sdot')[T2.i];if(dot)dot.classList.add('fin');
    }else{
      fb.className='tfb no';
      fb.textContent='Zhèngquè lǜ 正确率 '+Math.round(good/tar.length*100)+'% — 红色的字再检查一下。Check the red characters.';
    }
  }
}

    if(f.type==='scale'){
      body='<div class="scale">'+f.opts.map((o,j)=>
        '<button class="'+(S.fb[f.id]===j?'on':'')+'" data-fs="'+f.id+'" data-v="'+j+'">'+esc(o)+'</button>').join('')+'</div>';
    }else if(f.type==='multi'){
      const sel=S.fb[f.id]||[];
      body='<div class="multi">'+f.opts.map((o,j)=>
        '<button class="'+(sel.indexOf(j)>=0?'on':'')+'" data-fm="'+f.id+'" data-v="'+j+'">'+esc(o)+'</button>').join('')+'</div>';
    }else{
      body='<textarea class="fbox" data-ft="'+f.id+'" placeholder="'+esc(f.ph)+'"></textarea>';
    }
    return '<h3>'+L(f.py,f.cn,f.en)+'</h3><div class="card">'+body+
      '<div class="saved" id="sv_'+f.id+'"></div></div>';
  }).join('')+
  '<div style="text-align:center;margin-top:20px">'+
    '<button class="btn y" id="fbCopy">📋 '+L('Fùzhì gěi lǎoshī','复制给老师','Copy for teacher')+'</button>'+
    '<button class="btn ghost" id="fbShow">'+L('Kànkan wénzì','看看文字','Preview text')+'</button></div>'+
  '<textarea id="copyout" readonly></textarea>';
}
function fbText(){
  const qOk=Object.keys(S.quiz).filter(i=>S.quiz[i]===QUESTIONS[i].a).length;
  let t='Lachlan — 旅游单元反馈 Travel Unit Feedback\n';
  t+='日期 Date: '+new Date().toLocaleDateString()+'\n\n';
  t+='【记录 Progress】\n';
  t+='阅读题 Reading: '+qOk+'/'+QUESTIONS.length+'\n';
  t+='词语打字最好成绩 Best word accuracy: '+(S.best.word?S.best.word+'%':'—')+'\n';
  t+='打对的句子 Sentences typed correctly: '+Object.keys(S.done).length+'/'+SENTS.length+'\n';
  t+='最快速度 Best speed: '+(S.best.cpm||'—')+' 字/分 chars per min\n\n';
  t+='【反馈 Feedback】\n';
  FEEDBACK.forEach(f=>{
    const v=S.fb[f.id];let a='—';
    if(f.type==='scale')a=(v!==undefined)?f.opts[v]:'—';
    else if(f.type==='multi')a=(v&&v.length)?v.map(j=>f.opts[j]).join('、'):'—';
    else a=v||'—';
    t+=f.cn+' / '+f.en+'\n→ '+a+'\n\n';
  });
  return t;
}

/* ===== 路由 ===== */
const BUILD={read:pageRead,vocab:pageVocab,type1:pageType1,type2:pageType2,fb:pageFb};
let cur='read',vf='all';
function show(id){
  cur=id;hidePop();t1Cancel();
  document.getElementById('main').innerHTML='<section class="on">'+BUILD[id]()+'</section>';
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.p===id));
  window.scrollTo({top:0,behavior:'instant'});
  if(id==='read')renderQ();
  if(id==='vocab')renderV(vf,'');
  if(id==='type1')t1Load();
  if(id==='type2')t2Show();
  if(id==='fb')FEEDBACK.filter(f=>f.type==='text').forEach(f=>{
    const el=document.querySelector('[data-ft="'+f.id+'"]');if(el)el.value=S.fb[f.id]||'';
  });
}

/* ===== 事件 ===== */
document.addEventListener('click',e=>{
  const w=e.target.closest('.w');
  if(w){showPop(w.dataset.w,w);return;}
  const t=e.target.closest('button');
  if(!t){if(!e.target.closest('.pop'))hidePop();return;}
  if(t.dataset.x){hidePop();return;}
  if(t.dataset.p){show(t.dataset.p);return;}
  if(t.dataset.say!==undefined){speak(t.dataset.say,0.85);return;}
  if(t.id==='rdAll'){speak(SENTS.join(''),0.85);return;}
  if(t.dataset.q!==undefined){
    const i=+t.dataset.q;if(S.quiz[i]!==undefined)return;
    S.quiz[i]=+t.dataset.o;save();renderQ();return;
  }
  if(t.dataset.f){vf=t.dataset.f;
    document.querySelectorAll('.chip[data-f]').forEach(c=>c.classList.toggle('on',c===t));
    renderV(vf,document.getElementById('vq').value);return;}
  if(t.dataset.m){
    const m=t.dataset.m;
    if(m==='hanzi'||m==='pinyin'){T1.mode=m;
      document.querySelectorAll('[data-m="hanzi"],[data-m="pinyin"]').forEach(c=>c.classList.toggle('on',c===t));}
    else{T1.scope=m;
      document.querySelectorAll('[data-m="core"],[data-m="all"]').forEach(c=>c.classList.toggle('on',c===t));}
    t1Load();return;
  }
  if(t.id==='t1hint'){document.getElementById('t1rev').classList.remove('hide');document.getElementById('t1in').focus();return;}
  if(t.id==='t1skip'){if(T1.i<T1.list.length-1){T1.i++;t1Show();}else t1Done();return;}
  if(t.id==='t1new'){t1Load();return;}
  if(t.dataset.sm!==undefined){T2.strict=t.dataset.sm==='1';
    document.querySelectorAll('[data-sm]').forEach(c=>c.classList.toggle('on',c===t));t2Paint();return;}
  if(t.dataset.pc!==undefined){const i=document.getElementById('t2in');
    if(!T2.start)T2.start=Date.now();
    i.value+=t.dataset.pc;T2.typed=i.value;t2Paint();i.focus();return;}
  if(t.id==='t2say'){speak(SENTS[T2.i],0.8);return;}
  if(t.id==='t2next'){if(T2.i<SENTS.length-1){T2.i++;t2Show();}return;}
  if(t.id==='t2prev'){if(T2.i>0){T2.i--;t2Show();}return;}
  if(t.id==='t2clr'){document.getElementById('t2in').value='';T2.typed='';T2.start=0;t2Paint();
    document.getElementById('t2in').focus();return;}
  if(t.dataset.d!==undefined){T2.i=+t.dataset.d;t2Show();return;}
  // 反馈
  if(t.dataset.fs){S.fb[t.dataset.fs]=+t.dataset.v;save();
    t.parentElement.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b===t));
    flash('sv_'+t.dataset.fs);return;}
  if(t.dataset.fm){const id=t.dataset.fm,j=+t.dataset.v;
    S.fb[id]=S.fb[id]||[];
    const k=S.fb[id].indexOf(j);
    if(k>=0)S.fb[id].splice(k,1);else S.fb[id].push(j);
    save();t.classList.toggle('on');flash('sv_'+id);return;}
  if(t.id==='fbShow'){const o=document.getElementById('copyout');
    o.value=fbText();o.classList.add('on');return;}
  if(t.id==='fbCopy'){
    const txt=fbText(),o=document.getElementById('copyout');
    o.value=txt;o.classList.add('on');
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(()=>{t.textContent='✅ 已复制 Copied!';
        setTimeout(()=>{t.innerHTML='📋 '+L('Fùzhì gěi lǎoshī','复制给老师','Copy for teacher')},1800);});
    }else{o.select();document.execCommand&&document.execCommand('copy');}
    return;}
});
function flash(id){const e=document.getElementById(id);if(!e)return;
  e.textContent='✓ 已保存 Saved';setTimeout(()=>{if(e)e.textContent=''},1300);}

let composing=false;
document.addEventListener('compositionstart',()=>{composing=true});
document.addEventListener('compositionend',e=>{composing=false;handleInput(e)});
document.addEventListener('input',e=>{if(!composing)handleInput(e)});
function handleInput(e){
  const t=e.target;
  if(t.id==='vq'){renderV(vf,t.value);return;}
  if(t.id==='t2in'){if(!T2.start&&t.value.length)T2.start=Date.now();
    T2.typed=t.value;t2Paint();return;}
  if(t.dataset&&t.dataset.ft){S.fb[t.dataset.ft]=t.value;save();flash('sv_'+t.dataset.ft);return;}
}
document.addEventListener('keydown',e=>{
  if(e.target.id==='t1in'&&e.key==='Enter'){e.preventDefault();if(!composing)t1Check();}
  if(e.key==='Escape')hidePop();
});
document.addEventListener('scroll',hidePop,{passive:true});

/* 工具栏 */
document.getElementById('bPy').onclick=function(){
  document.body.classList.toggle('no-py');
  const on=pyOn();
  this.textContent='Pīnyīn 拼音 Pinyin：'+(on?'开 ON':'关 OFF');
  this.classList.toggle('on',on);
  if(cur==='type1')t1Show();
};
document.getElementById('bFs').onclick=function(){
  const b=document.body;
  if(b.classList.contains('fs-xl'))b.classList.remove('fs-xl');
  else if(b.classList.contains('fs-l')){b.classList.remove('fs-l');b.classList.add('fs-xl');}
  else b.classList.add('fs-l');
};
document.getElementById('bSpeak').onclick=()=>{
  if(cur==='read')speak(SENTS.join(''),0.85);
  else if(cur==='type2')speak(SENTS[T2.i],0.8);
  else speak('请先打开阅读故事那一页。',0.9);
};
document.getElementById('bReset').onclick=()=>{
  if(confirm('Qīngkōng suǒyǒu jìlù ma? 清空所有记录吗？Clear all progress and feedback? This cannot be undone.')){
    S={quiz:{},best:{},done:{},fb:{}};
    try{localStorage.removeItem(KEY)}catch(e){}
    show(cur);
  }
};

show('read');
</script>
